auth:
  environment: development
  providers:
    microsoft:
      development:
        clientId: ${AUTH_MICROSOFT_CLIENT_ID}
        clientSecret: ${AUTH_MICROSOFT_CLIENT_SECRET}
        tenantId: ${AUTH_MICROSOFT_TENANT_ID}
        signIn:
          resolvers:
            - resolver: emailMatchingUserEntityProfileEmail
    guest:
      dangerouslyAllowOutsideDevelopment: true
app:
  title: MP-Backstage
  baseUrl: http://localhost:3000
  signInPage: microsoft
  scaffolderDefaults:
    organization: ${AZURE_DEVOPS_ORG}
    agentPool: ${AZURE_DEVOPS_AGENT_POOL}

catalog:
  locations:
    - type: file
      target: ../../catalog/users/all-users.yaml
      rules:
        - allow: [User, Group]
    - type: file
      target: ../../catalog/templates/all-templates.yaml
      rules:
        - allow: [Template]

techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

sonarqube:
  baseUrl: ${SONARQUBE_URL}
  apiKey: ${SONARQUBE_TOKEN}