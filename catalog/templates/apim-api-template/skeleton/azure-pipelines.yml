# =============================================================================
# Azure Pipeline — APIM API Onboarding (Terraform IaC)
# API: ${{ values.apiDisplayName }} (v${{ values.apiVersion }})
# Generated by MP-Backstage Scaffolder
#
# STAGES:
#   1. BackstageGate    — ตรวจสอบว่า entity ลง Backstage catalog แล้ว
#   2. ValidateSpec     — Redocly lint + oasdiff breaking change detection
#   3. SecurityScan     — Trivy secret & config scan
#   4. CodeQuality      — SonarQube analysis
#   5. TerraformPlan    — tf init + validate + plan (iac/)
#   6. TerraformApply   — tf apply (iac/) → deploy API + observability
#   7. LifecycleUpdate  — PATCH catalog-info.yaml lifecycle → production
# =============================================================================

trigger:
  - main

pool:
  name: '${{ values.agentPool }}'

variables:
  apiName:              '${{ values.apiName }}'
  apiDisplayName:       '${{ values.apiDisplayName }}'
  apiVersion:           '${{ values.apiVersion }}'
  apiPath:              '${{ values.apiPath }}'
  apimServiceName:      '${{ values.apimServiceName }}'
  apimResourceGroup:    '${{ values.apimResourceGroup }}'
  apimServiceConnection: '${{ values.apimServiceConnection }}'
  backstageBaseUrl:     '${{ values.backstageBaseUrl }}'
  tfStateResourceGroup: '${{ values.tfStateResourceGroup }}'
  tfStateStorageAccount: '${{ values.tfStateStorageAccount }}'

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 1: Backstage Gate — ADR-002 Shift-Left Governance
# ตรวจสอบว่า API entity ถูก register ใน Backstage catalog แล้วก่อน deploy
# ══════════════════════════════════════════════════════════════════════════════
stages:
  - stage: BackstageGate
    displayName: '1 · Backstage Registration Gate'
    jobs:
      - job: CheckCatalog
        displayName: 'Verify entity in Backstage catalog'
        steps:
          - checkout: none

          - script: |
              echo ""
              echo "╔══════════════════════════════════════════════════╗"
              echo "║         ADR-002: Backstage Registration Gate      ║"
              echo "╚══════════════════════════════════════════════════╝"
              echo ""
              echo "  Backstage URL : $(backstageBaseUrl)"
              echo "  Entity        : component/default/$(apiName)"
              echo ""

              # ── ตรวจสอบ entity ใน Backstage catalog ──────────────────
              BACKSTAGE_URL="$(backstageBaseUrl)"
              ENTITY_KIND="component"
              ENTITY_NAMESPACE="default"
              ENTITY_NAME="$(apiName)"

              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                "${BACKSTAGE_URL}/api/catalog/entities/by-name/${ENTITY_KIND}/${ENTITY_NAMESPACE}/${ENTITY_NAME}" \
                -H "Accept: application/json" \
                --connect-timeout 10 \
                --max-time 30)

              echo "  HTTP Status: ${HTTP_STATUS}"

              if [ "${HTTP_STATUS}" = "200" ]; then
                echo ""
                echo "  ✅ Entity พบใน Backstage catalog — ดำเนินการต่อ"
              elif [ "${HTTP_STATUS}" = "404" ]; then
                echo ""
                echo "  ⚠️  Entity ยังไม่พบใน catalog (404)"
                echo "     Backstage Scaffolder กำลัง register อยู่ — ดำเนินการต่อ"
                echo "     (Gate นี้ blocking สำหรับการ re-deploy เท่านั้น)"
              else
                echo ""
                echo "  ⚠️  ไม่สามารถเชื่อมต่อ Backstage ได้ (status: ${HTTP_STATUS})"
                echo "     ข้ามขั้นตอนนี้ — ตรวจสอบ network connectivity"
              fi
            displayName: 'Check entity in Backstage catalog (ADR-002)'
            continueOnError: true

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 2: Validate OpenAPI Spec
# Redocly lint + oasdiff breaking change detection
# ══════════════════════════════════════════════════════════════════════════════
  - stage: ValidateSpec
    displayName: '2 · Validate OpenAPI Spec'
    dependsOn: BackstageGate
    jobs:
      - job: Validate
        displayName: 'Redocly lint + breaking change check'
        steps:
          - checkout: self

          # ── Redocly Lint ───────────────────────────────────────────────────
          - script: |
              echo ""
              echo "╔══════════════════════════════════════════╗"
              echo "║     🔍 OpenAPI Spec Validation Report     ║"
              echo "╚══════════════════════════════════════════╝"
              echo ""

              TITLE=$(grep -m1 'title:' openapi.yaml | awk '{$1=""; print $0}' | xargs)
              VERSION=$(grep -m1 'version:' openapi.yaml | awk '{$1=""; print $0}' | xargs)
              echo "  📄 File    : openapi.yaml"
              echo "  📌 Title   : ${TITLE:-N/A}"
              echo "  🔖 Version : ${VERSION:-N/A}"
              echo ""

              RESULT=$(npx -y @redocly/cli lint openapi.yaml --format=stylish 2>&1 || true)
              ERRORS=$(echo "$RESULT" | grep -c ' error ' || echo "0")
              WARNINGS=$(echo "$RESULT" | grep -c ' warning ' || echo "0")

              echo "$RESULT" | grep -E 'error|warning' | while read -r line; do
                if echo "$line" | grep -q "error"; then
                  echo "  ❌ $line"
                else
                  echo "  ⚠️  $line"
                fi
              done

              echo ""
              echo "──────────────────────────────────────────"
              [ "${ERRORS}" -eq "0" ] && echo "  ✅ Errors   : 0" || echo "  ❌ Errors   : ${ERRORS}"
              [ "${WARNINGS}" -eq "0" ] && echo "  ✅ Warnings : 0" || echo "  ⚠️  Warnings : ${WARNINGS}"
              echo "──────────────────────────────────────────"

              # JUnit report
              JUNIT="openapi-lint-results.xml"
              echo '<?xml version="1.0" encoding="UTF-8"?>' > "$JUNIT"
              echo '<testsuites name="OpenAPI Lint"><testsuite name="Redocly Lint" tests="2">' >> "$JUNIT"

              if [ "${ERRORS}" -eq "0" ]; then
                echo '  <testcase name="No validation errors" classname="OpenAPILint" />' >> "$JUNIT"
              else
                MSG=$(echo "$RESULT" | grep ' error ' | head -5 | tr '"' "'")
                echo "  <testcase name=\"No validation errors\" classname=\"OpenAPILint\"><failure message=\"${ERRORS} error(s)\">${MSG}</failure></testcase>" >> "$JUNIT"
              fi

              if [ "${WARNINGS}" -eq "0" ]; then
                echo '  <testcase name="No validation warnings" classname="OpenAPILint" />' >> "$JUNIT"
              else
                echo "  <testcase name=\"No validation warnings\" classname=\"OpenAPILint\"><failure message=\"${WARNINGS} warning(s)\" /></testcase>" >> "$JUNIT"
              fi

              echo '</testsuite></testsuites>' >> "$JUNIT"
            displayName: 'Redocly lint — validate openapi.yaml'
            continueOnError: true

          # ── oasdiff Breaking Change Detection ─────────────────────────────
          - script: |
              echo ""
              echo "╔══════════════════════════════════════════╗"
              echo "║   🔄 oasdiff: Breaking Change Detection   ║"
              echo "╚══════════════════════════════════════════╝"
              echo ""

              # ติดตั้ง oasdiff ถ้ายังไม่มี
              if ! command -v oasdiff &> /dev/null; then
                echo "⚙️  Installing oasdiff..."
                curl -fsSL https://raw.githubusercontent.com/Tufin/oasdiff/main/install.sh | sh
              fi

              # ดึง openapi.yaml จาก commit ก่อนหน้า (HEAD~1)
              if git show HEAD~1:openapi.yaml > openapi-prev.yaml 2>/dev/null; then
                echo "  📋 พบ spec เดิม — ตรวจหา breaking changes..."
                echo ""

                BREAKING=$(oasdiff breaking openapi-prev.yaml openapi.yaml 2>&1 || true)

                if [ -z "$BREAKING" ]; then
                  echo "  ✅ ไม่พบ Breaking Changes — ปลอดภัยที่จะ deploy"
                else
                  echo "  ❌ พบ Breaking Changes:"
                  echo ""
                  echo "$BREAKING" | while read -r line; do
                    echo "     🚫 $line"
                  done
                  echo ""
                  echo "  ⚠️  Breaking changes อาจกระทบ API consumers"
                  echo "     พิจารณา bump API version หรือ coordinate กับ consumers"
                fi

                # JUnit report สำหรับ oasdiff
                JUNIT="oasdiff-results.xml"
                echo '<?xml version="1.0" encoding="UTF-8"?>' > "$JUNIT"
                echo '<testsuites name="oasdiff"><testsuite name="Breaking Change Detection" tests="1">' >> "$JUNIT"

                if [ -z "$BREAKING" ]; then
                  echo '  <testcase name="No breaking changes detected" classname="oasdiff" />' >> "$JUNIT"
                else
                  BREAKING_ESC=$(echo "$BREAKING" | head -10 | tr '"<>' "'[]")
                  echo "  <testcase name=\"No breaking changes detected\" classname=\"oasdiff\"><failure message=\"Breaking changes found\">${BREAKING_ESC}</failure></testcase>" >> "$JUNIT"
                fi

                echo '</testsuite></testsuites>' >> "$JUNIT"
              else
                echo "  ℹ️  ไม่พบ spec เดิม — deploy ครั้งแรก ข้ามการตรวจ breaking changes"

                # JUnit pass สำหรับ first deploy
                JUNIT="oasdiff-results.xml"
                echo '<?xml version="1.0" encoding="UTF-8"?><testsuites name="oasdiff"><testsuite name="Breaking Change Detection" tests="1"><testcase name="First deployment - no baseline to compare" classname="oasdiff" /></testsuite></testsuites>' > "$JUNIT"
              fi

              # ล้างไฟล์ชั่วคราว
              rm -f openapi-prev.yaml
            displayName: 'oasdiff — breaking change detection'
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish Validation Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '*-results.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              testRunTitle: 'OpenAPI Validation'
              mergeTestResults: true
              failTaskOnFailedTests: false
            condition: always()

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 3: Security Scan (Trivy)
# ══════════════════════════════════════════════════════════════════════════════
  - stage: SecurityScan
    displayName: '3 · Security Scan (Trivy)'
    dependsOn: ValidateSpec
    jobs:
      - job: TrivyScan
        displayName: 'Trivy Secret & Config Scan'
        steps:
          - checkout: self

          - script: |
              if command -v trivy &> /dev/null; then
                echo "✅ Trivy already installed: $(trivy --version | head -1)"
              else
                echo "⚙️  Installing Trivy..."
                curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
                echo "✅ Trivy installed"
              fi
            displayName: 'Ensure Trivy is installed'

          - script: |
              echo "🔍 Scanning for hardcoded secrets..."
              trivy fs --scanners secret \
                --format template \
                --template "@tests/trivy-junit.tpl" \
                -o trivy-secret-results.xml .
            displayName: 'Trivy — Secret scan'
            continueOnError: true

          - script: |
              echo "🔍 Scanning IaC configurations..."
              trivy config \
                --format template \
                --template "@tests/trivy-junit.tpl" \
                -o trivy-config-results.xml \
                --skip-dirs .terraform .
            displayName: 'Trivy — Config/IaC scan'
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish Trivy Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'trivy-*-results.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              testRunTitle: 'Trivy Security Scans'
              mergeTestResults: true
              failTaskOnFailedTests: false
            condition: always()

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 4: Terraform Plan
# terraform init + validate + plan (iac/) — ดู diff ก่อน apply
# ══════════════════════════════════════════════════════════════════════════════
  - stage: TerraformPlan
    displayName: '4 · Terraform Plan'
    dependsOn: SecurityScan
    jobs:
      - job: TFPlan
        displayName: 'terraform init + validate + plan'
        steps:
          - checkout: self

          - script: |
              if command -v terraform &> /dev/null; then
                echo "✅ Terraform already installed: $(terraform --version | head -1)"
              else
                echo "⚙️  Installing Terraform..."
                TF_VERSION="1.7.5"
                OS=$(uname -s | tr '[:upper:]' '[:lower:]')
                ARCH=$(uname -m)
                [ "$ARCH" = "x86_64" ] && ARCH="amd64"
                [ "$ARCH" = "arm64" ] && ARCH="arm64"
                [ "$ARCH" = "aarch64" ] && ARCH="arm64"
                echo "  Platform: ${OS}_${ARCH}"
                curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_${OS}_${ARCH}.zip" -o terraform.zip
                unzip -q terraform.zip
                sudo mv terraform /usr/local/bin/ 2>/dev/null || mv terraform $HOME/.local/bin/terraform 2>/dev/null || true
                export PATH="$HOME/.local/bin:$PATH"
                rm -f terraform.zip
                echo "✅ $(terraform --version | head -1) installed"
              fi
            displayName: 'Install Terraform'

          - task: AzureCLI@2
            displayName: 'Terraform Init & Plan'
            inputs:
              azureSubscription: '$(apimServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true   # inject ARM_* env vars อัตโนมัติ
              inlineScript: |
                set -e
                cd iac/

                echo ""
                echo "╔══════════════════════════════════════════════════╗"
                echo "║            🏗️  Terraform Plan                     ║"
                echo "╚══════════════════════════════════════════════════╝"
                echo ""
                echo "  API  : $(apiName)"
                echo "  APIM : $(apimServiceName)"
                echo "  RG   : $(apimResourceGroup)"
                echo ""

                # Export ARM credentials — รองรับทั้ง Workload Identity Federation และ Service Principal
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                if [ -n "$idToken" ]; then
                  # Workload Identity Federation (OIDC) — ไม่มี client secret
                  export ARM_USE_OIDC=true
                  export ARM_OIDC_TOKEN="$idToken"
                else
                  # Service Principal แบบ classic
                  export ARM_CLIENT_SECRET="$servicePrincipalKey"
                fi

                echo "── terraform init ──────────────────────────────────"
                terraform init \
                  -input=false \
                  -reconfigure

                echo ""
                echo "── terraform validate ──────────────────────────────"
                terraform validate

                echo ""
                echo "── terraform plan ──────────────────────────────────"
                terraform plan \
                  -input=false \
                  -out=tfplan \
                  -detailed-exitcode \
                  2>&1 | tee tf-plan-output.txt

                PLAN_EXIT=${PIPESTATUS[0]}

                if [ "$PLAN_EXIT" -eq "0" ]; then
                  echo ""
                  echo "✅ No changes — infrastructure is up-to-date"
                elif [ "$PLAN_EXIT" -eq "2" ]; then
                  echo ""
                  echo "📋 Changes detected — รอ approval ก่อน apply"
                else
                  echo ""
                  echo "❌ Terraform plan failed"
                  exit 1
                fi

                # บันทึก plan exit code สำหรับ stage ถัดไป
                echo "##vso[task.setvariable variable=TF_PLAN_EXIT;isOutput=true]$PLAN_EXIT"

            name: TFPlanStep

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Terraform Plan'
            inputs:
              pathToPublish: 'iac/tfplan'
              artifactName: 'terraform-plan'
            condition: always()

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 6: Terraform Apply
# Deploy API + policy + backend + App Insights + alert rules
# ══════════════════════════════════════════════════════════════════════════════
  - stage: TerraformApply
    displayName: '5 · Terraform Apply'
    dependsOn: TerraformPlan
    jobs:
      - deployment: TFApply
        displayName: 'terraform apply iac/'
        environment: 'production'   # ต้องสร้าง environment ใน Azure DevOps ก่อน
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    if command -v terraform &> /dev/null; then
                      echo "✅ Terraform already installed: $(terraform --version | head -1)"
                    else
                      TF_VERSION="1.7.5"
                      OS=$(uname -s | tr '[:upper:]' '[:lower:]')
                      ARCH=$(uname -m)
                      [ "$ARCH" = "x86_64" ] && ARCH="amd64"
                      [ "$ARCH" = "arm64" ] && ARCH="arm64"
                      [ "$ARCH" = "aarch64" ] && ARCH="arm64"
                      curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_${OS}_${ARCH}.zip" -o terraform.zip
                      unzip -q terraform.zip
                      sudo mv terraform /usr/local/bin/ 2>/dev/null || mv terraform $HOME/.local/bin/terraform 2>/dev/null || true
                      export PATH="$HOME/.local/bin:$PATH"
                      rm -f terraform.zip
                    fi
                  displayName: 'Install Terraform'

                - task: AzureCLI@2
                  displayName: 'Terraform Apply'
                  inputs:
                    azureSubscription: '$(apimServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -e
                      cd iac/

                      echo ""
                      echo "╔══════════════════════════════════════════════════╗"
                      echo "║            🚀 Terraform Apply                     ║"
                      echo "╚══════════════════════════════════════════════════╝"
                      echo ""
                      echo "  API  : $(apiName)"
                      echo "  APIM : $(apimServiceName)"
                      echo "  RG   : $(apimResourceGroup)"
                      echo ""

                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      if [ -n "$idToken" ]; then
                        export ARM_USE_OIDC=true
                        export ARM_OIDC_TOKEN="$idToken"
                      else
                        export ARM_CLIENT_SECRET="$servicePrincipalKey"
                      fi

                      # Init อีกครั้งใน deployment job (fresh workspace)
                      terraform init -input=false -reconfigure

                      # Apply
                      terraform apply \
                        -input=false \
                        -auto-approve

                      echo ""
                      echo "✅ Terraform apply สำเร็จ!"
                      echo ""

                      # แสดง outputs
                      echo "── Outputs ─────────────────────────────────────────"
                      terraform output -json | jq -r 'to_entries[] | "  \(.key): \(.value.value)"' 2>/dev/null || true

                      # ดึง Gateway URL
                      GATEWAY_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "N/A")
                      echo ""
                      echo "  🌐 Gateway URL: ${GATEWAY_URL}"
                      echo "##vso[task.setvariable variable=GATEWAY_URL]${GATEWAY_URL}"

# ══════════════════════════════════════════════════════════════════════════════
# STAGE 7: Lifecycle Update
# Commit กลับ catalog-info.yaml เพื่ออัปเดต lifecycle → production
# ══════════════════════════════════════════════════════════════════════════════
  - stage: LifecycleUpdate
    displayName: '6 · Lifecycle Update → production'
    dependsOn: TerraformApply
    condition: succeeded()
    jobs:
      - job: UpdateLifecycle
        displayName: 'Update catalog-info.yaml lifecycle'
        steps:
          - checkout: self
            persistCredentials: true   # เก็บ git credentials สำหรับ push

          - script: |
              echo ""
              echo "╔══════════════════════════════════════════════════╗"
              echo "║         📋 Lifecycle Update → production          ║"
              echo "╚══════════════════════════════════════════════════╝"
              echo ""

              # ── ตรวจสอบ lifecycle ปัจจุบัน ───────────────────────────
              CURRENT=$(grep 'lifecycle:' catalog-info.yaml | head -1 | awk '{print $2}' | tr -d '"')
              echo "  Current lifecycle : ${CURRENT}"
              echo "  Target lifecycle  : production"
              echo ""

              if [ "${CURRENT}" = "production" ]; then
                echo "  ℹ️  Already production — ไม่ต้องอัปเดต"
                exit 0
              fi

              # ── อัปเดต lifecycle ใน catalog-info.yaml ────────────────
              sed -i "s/lifecycle: ${CURRENT}/lifecycle: production/" catalog-info.yaml

              UPDATED=$(grep 'lifecycle:' catalog-info.yaml | head -1 | awk '{print $2}')
              echo "  ✅ Updated lifecycle: ${UPDATED}"
              echo ""

              # ── Git commit & push ─────────────────────────────────────
              git config user.email "pipeline@azuredevops.com"
              git config user.name "Azure Pipeline [bot]"

              git add catalog-info.yaml
              git diff --staged --quiet && echo "  ℹ️  No changes to commit" && exit 0

              git commit -m "ci(lifecycle): $(apiName) → production after successful deploy [skip ci]"

              # Push กลับ main branch
              git push origin HEAD:main

              echo ""
              echo "  ✅ catalog-info.yaml updated และ push สำเร็จ"
              echo "     Backstage จะ sync ภายใน 1-5 นาที"
              echo ""
              echo "  🔗 Backstage: $(backstageBaseUrl)/catalog/default/component/$(apiName)"
            displayName: 'Update lifecycle → production in catalog-info.yaml'
