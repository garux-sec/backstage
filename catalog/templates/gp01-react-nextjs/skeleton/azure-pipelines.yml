# Azure DevOps Pipeline for GP#01 React/Next.js
# Golden Path: gp01-react-nextjs-nodejs
# Auto-generated by MP-Backstage scaffolder
# Deployment target: ${{ values.deploymentTarget }}

trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main

variables:
  # ── Static variables (baked in at scaffold time) ──────────────────────────
  - name: projectName
    value: '${{ values.name }}'
  - name: nodeVersion
    value: '20.x'
  - name: TF_VERSION
    value: '1.7.5'
  {%- if values.deploymentTarget != 'on-premise-vm' or values.registryType == 'acr' %}
  - name: azureServiceConnection
    value: 'azure-service-connection'
  {%- endif %}
  {%- if values.deploymentTarget == 'on-premise-vm' %}
  {%- if values.registryType == 'acr' %}
  - name: dockerRegistry
    value: '${{ values.acrName }}.azurecr.io'
  - name: acrName
    value: '${{ values.acrName }}'
  {%- else %}
  - name: dockerRegistry
    value: '${{ values.dockerRegistry }}'
  {%- endif %}
  - name: vmHost
    value: '${{ values.vmHost }}'
  - name: vmUser
    value: '${{ values.vmUser }}'
  {%- endif %}

  # ── Secrets from ADO Variable Group → Azure Key Vault ────────────────────
  # สร้าง Variable Group ชื่อ "${{ values.name }}-secrets" ใน ADO Library
  # แล้ว link ไป Azure Key Vault (ดู README สำหรับขั้นตอน)
  - group: ${{ values.name }}-secrets

pool:
  name: ${{ values.agentPool }}

stages:
  # ─── Stage 1: Build & Test ───────────────────────────────────────────────────
  - stage: CI
    displayName: 'Build & Test'
    jobs:
      - job: Build
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Use Node.js $(nodeVersion)'

          - script: |
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
            displayName: 'Install dependencies'

          - script: npm run lint
            displayName: 'Lint (ESLint + TypeScript)'
            continueOnError: true

          - script: npm run test -- --coverage
            displayName: 'Unit tests (Vitest/Jest)'
            continueOnError: true

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/junit.xml'
            condition: always()
            displayName: 'Publish test results'
            continueOnError: true

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: '**/coverage/cobertura-coverage.xml'
            condition: always()
            displayName: 'Publish coverage'
            continueOnError: true

          - script: npm run build
            displayName: 'Build Next.js'

          {%- if values.deploymentTarget == 'on-premise-vm' %}
          # ── On-Premise: Docker build + push to registry ─────────────────────
          - script: |
              IMAGE_TAG="$(Build.BuildId)"
              IMAGE_FULL="$(dockerRegistry)/$(projectName):${IMAGE_TAG}"
              IMAGE_LATEST="$(dockerRegistry)/$(projectName):latest"

              echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]${IMAGE_TAG}"
              echo "Building Docker image: ${IMAGE_FULL}"

              docker build \
                --build-arg NODE_ENV=production \
                -t "${IMAGE_FULL}" \
                -t "${IMAGE_LATEST}" \
                .
            name: dockerBuild
            displayName: 'Docker Build'

          {%- if values.registryType == 'acr' %}
          - task: AzureCLI@2
            displayName: 'Docker Push to ACR'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(acrName)
                docker push "$(dockerRegistry)/$(projectName):$(Build.BuildId)"
                docker push "$(dockerRegistry)/$(projectName):latest"
                echo "Image pushed to ACR: $(dockerRegistry)/$(projectName):$(Build.BuildId)"
          {%- else %}
          - script: |
              IMAGE_TAG="$(Build.BuildId)"
              IMAGE_FULL="$(dockerRegistry)/$(projectName):${IMAGE_TAG}"
              IMAGE_LATEST="$(dockerRegistry)/$(projectName):latest"

              if [ -n "$(REGISTRY_USER)" ] && [ -n "$(REGISTRY_PASSWORD)" ]; then
                echo "$(REGISTRY_PASSWORD)" | docker login "$(dockerRegistry)" \
                  -u "$(REGISTRY_USER)" --password-stdin
              fi

              docker push "${IMAGE_FULL}"
              docker push "${IMAGE_LATEST}"
              echo "Image pushed: ${IMAGE_FULL}"
            displayName: 'Docker Push to Private Registry'
          {%- endif %}

          {%- else %}
          # ── Azure targets: zip artifact ────────────────────────────────────
          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(projectName).zip'
              replaceExistingArchive: true
            displayName: 'Archive build artifact'

          - publish: '$(Build.ArtifactStagingDirectory)/$(projectName).zip'
            artifact: 'app-artifact'
            displayName: 'Publish artifact'
          {%- endif %}

  # ─── Stage 2: Secure Coding & Static Analysis ───────────────────────────────
  - stage: SecureCodingAndStaticAnalysis
    displayName: 'Step 2: Secure Coding & Static Analysis'
    dependsOn: CI
    jobs:
      - job: SourceScans
        displayName: 'Run SAST, Secret, SCA, and IaC Scans'
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'

          # 1. SAST Scan (SonarQube) - Prepare
          - task: SonarQubePrepare@7
            inputs:
              SonarQube: 'SonarQubeServer'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: '$(projectName)'
              cliProjectName: '$(projectName)'
              cliSources: '.'
              extraProperties: |
                sonar.externalIssuesReportPaths=$(System.DefaultWorkingDirectory)/trivy-sonarqube.json,$(System.DefaultWorkingDirectory)/trivy-config-sonarqube.json
            continueOnError: true

          # 2. Secret Scan (Gitleaks)
          - script: |
              wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
              tar -xvf gitleaks_8.18.2_linux_x64.tar.gz
              ./gitleaks detect --source . -v --report-format junit --report-path $(System.DefaultWorkingDirectory)/gitleaks-results.xml
            displayName: 'Secret Scan (Gitleaks)'
            continueOnError: true

          # 3. SCA Scan (Trivy Library + npm audit)
          - script: npm audit --audit-level=high
            displayName: 'npm audit'
            continueOnError: true

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b .
              wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl
              wget https://raw.githubusercontent.com/mendhak/trivy-template-output-to-sonarqube/master/sonarqube.tpl
              ./trivy fs --severity CRITICAL,HIGH --format template --template "@junit.tpl" --output $(System.DefaultWorkingDirectory)/trivy-fs-results.xml .
              ./trivy fs --severity CRITICAL,HIGH --format template --template "@sonarqube.tpl" --output $(System.DefaultWorkingDirectory)/trivy-sonarqube.json .
            displayName: 'SCA Scan - Library (Trivy FS)'
            continueOnError: true

          # 4. IaC Scan (Trivy Config - Dockerfile, Terraform, docker-compose)
          - script: |
              ./trivy config --severity CRITICAL,HIGH --format template --template "@junit.tpl" --output $(System.DefaultWorkingDirectory)/trivy-config-results.xml .
              ./trivy config --severity CRITICAL,HIGH --format template --template "@sonarqube.tpl" --output $(System.DefaultWorkingDirectory)/trivy-config-sonarqube.json .
            displayName: 'IaC Scan - Infra (Trivy Config)'
            continueOnError: true

          # 5. Run SAST Analysis (SonarQube)
          - task: SonarQubeAnalyze@7
            continueOnError: true
          - task: SonarQubePublish@7
            inputs:
              pollingTimeoutSec: '300'
            continueOnError: true

          # 6. Publish Security Scan Results
          - task: PublishTestResults@2
            displayName: 'Publish Security Scan Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(System.DefaultWorkingDirectory)/*-results.xml'
              mergeTestResults: true
              testRunTitle: 'Security Scans (SAST/SCA/IaC/Secret)'
            condition: succeededOrFailed()

  {%- if values.deploymentTarget == 'on-premise-vm' %}
  # ─── Stage 3: Container Build & Supply Chain Security ───────────────────────
  - stage: ContainerBuildAndSupplyChain
    displayName: 'Step 3: Container Build & Supply Chain'
    dependsOn: SecureCodingAndStaticAnalysis
    jobs:
      - job: BuildScanAndPush
        displayName: 'Build Docker, Scan and Push'
        steps:
          - checkout: self

          - script: |
              IMAGE_TAG="$(Build.BuildId)"
              IMAGE_FULL="$(dockerRegistry)/$(projectName):${IMAGE_TAG}"
              IMAGE_LATEST="$(dockerRegistry)/$(projectName):latest"
              docker build --build-arg NODE_ENV=production -t "${IMAGE_FULL}" -t "${IMAGE_LATEST}" .
            displayName: 'Docker Build'

          # Container Scan (Trivy Image) - Security Gate
          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b .
              wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl
              ./trivy image --severity CRITICAL,HIGH --format template --template "@junit.tpl" --output $(System.DefaultWorkingDirectory)/trivy-image-results.xml $(dockerRegistry)/$(projectName):$(Build.BuildId)
              ./trivy image --exit-code 1 --severity CRITICAL,HIGH $(dockerRegistry)/$(projectName):$(Build.BuildId)
            displayName: 'Container Scan (Trivy) - Security Gate'
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish Container Scan Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(System.DefaultWorkingDirectory)/trivy-image-results.xml'
              testRunTitle: 'Container Security Scan'
            condition: succeededOrFailed()

          {%- if values.registryType == 'acr' %}
          - task: AzureCLI@2
            displayName: 'Docker Push to ACR'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(acrName)
                docker push "$(dockerRegistry)/$(projectName):$(Build.BuildId)"
                docker push "$(dockerRegistry)/$(projectName):latest"
          {%- else %}
          - script: |
              if [ -n "$(REGISTRY_USER)" ] && [ -n "$(REGISTRY_PASSWORD)" ]; then
                echo "$(REGISTRY_PASSWORD)" | docker login "$(dockerRegistry)" -u "$(REGISTRY_USER)" --password-stdin
              fi
              docker push "$(dockerRegistry)/$(projectName):$(Build.BuildId)"
              docker push "$(dockerRegistry)/$(projectName):latest"
            displayName: 'Docker Push to Private Registry'
          {%- endif %}
  {%- endif %}

  {%- if values.deploymentTarget == 'on-premise-vm' %}
  # ─── Stage 4: Deploy to Staging (On-Premise) ────────────────────────────────
  - stage: DeployOnPremStaging
    displayName: 'Deploy to Staging VM'
    dependsOn: ContainerBuildAndSupplyChain
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - name: environment
        value: 'staging'
    jobs:
      - job: DeployStaging
        displayName: 'Ansible Deploy (Staging)'
        steps:
          - checkout: self

          - script: |
              if ! command -v ansible &>/dev/null; then
                pip3 install ansible --break-system-packages || pip3 install ansible
              fi
              ansible-galaxy collection install community.docker --force
            displayName: 'Install Ansible + community.docker'

          - script: |
              cd infra/ansible
              ansible-playbook deploy-onprem.yml \
                -i inventory-onprem \
                --private-key "$(DEPLOY_SSH_KEY_PATH)"
            displayName: 'Ansible Deploy (Staging VM)'
            env:
              PROJECT_NAME:      $(projectName)
              ENVIRONMENT:       $(environment)
              IMAGE_TAG:         $(Build.BuildId)
              DOCKER_REGISTRY:   $(dockerRegistry)
              REGISTRY_USER:     $(REGISTRY_USER)
              REGISTRY_PASSWORD: $(REGISTRY_PASSWORD)
              ANSIBLE_HOST_KEY_CHECKING: 'False'

  # ─── Stage 5: DAST Scan (On-Premise) ────────────────────────────────────────
  - stage: DASTScanOnPrem
    displayName: 'DAST Scan (OWASP ZAP)'
    dependsOn: DeployOnPremStaging
    condition: succeeded()
    jobs:
      - job: ZapScan
        displayName: 'OWASP ZAP Baseline Scan'
        steps:
          - script: |
              docker run -t owasp/zap2docker-stable zap-baseline.py -t http://$(vmHost):3000 || true
            displayName: 'Run OWASP ZAP on Staging'
            continueOnError: true

  # ─── Stage 6: Deploy to Production (On-Premise) ─────────────────────────────
  - stage: DeployOnPremProd
    displayName: 'Deploy to Prod VM'
    dependsOn: DASTScanOnPrem
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    variables:
      - name: environment
        value: 'prod'
    jobs:
      - job: DeployProd
        displayName: 'Ansible Deploy (Prod)'
        steps:
          - checkout: self

          - script: |
              if ! command -v ansible &>/dev/null; then
                pip3 install ansible --break-system-packages || pip3 install ansible
              fi
              ansible-galaxy collection install community.docker --force
            displayName: 'Install Ansible + community.docker'

          - script: |
              cd infra/ansible
              ansible-playbook deploy-onprem.yml \
                -i inventory-onprem \
                --private-key "$(DEPLOY_SSH_KEY_PATH)"
            displayName: 'Ansible Deploy (Prod VM)'
            env:
              PROJECT_NAME:      $(projectName)
              ENVIRONMENT:       $(environment)
              IMAGE_TAG:         $(Build.BuildId)
              DOCKER_REGISTRY:   $(dockerRegistry)
              REGISTRY_USER:     $(REGISTRY_USER)
              REGISTRY_PASSWORD: $(REGISTRY_PASSWORD)
              ANSIBLE_HOST_KEY_CHECKING: 'False'

  {%- else %}
  # ─── Stage 3: Deploy to Dev (Azure) ──────────────────────────────────────────
  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: SecureCodingAndStaticAnalysis
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - name: environment
        value: 'dev'
    jobs:
      - deployment: DeployDev
        environment: '$(projectName)-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    if ! command -v terraform &>/dev/null; then
                      OS=$(uname -s | tr '[:upper:]' '[:lower:]')
                      ARCH=$(uname -m)
                      [ "$ARCH" = "x86_64" ] && ARCH="amd64"
                      [ "$ARCH" = "arm64" ]  && ARCH="arm64"
                      echo "Installing Terraform $(TF_VERSION)..."
                      curl -fsSL "https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_${OS}_${ARCH}.zip" -o terraform.zip
                      unzip -o terraform.zip && rm terraform.zip
                      mkdir -p ~/bin && mv terraform ~/bin/
                      export PATH="$HOME/bin:$PATH"
                    fi
                    terraform version
                  displayName: 'Install Terraform'

                - task: AzureCLI@2
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      export PATH="$HOME/bin:$PATH"
                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      if [ -n "$idToken" ]; then
                        export ARM_USE_OIDC=true
                        export ARM_OIDC_TOKEN="$idToken"
                      else
                        export ARM_CLIENT_SECRET="$servicePrincipalKey"
                      fi
                      cd infra/terraform
                      terraform init \
                        -backend-config="resource_group_name=tfstate-rg" \
                        -backend-config="storage_account_name=tfstate$(projectName)" \
                        -backend-config="container_name=tfstate" \
                        -backend-config="key=$(projectName).$(environment).tfstate"
                      terraform plan \
                        -var="environment=$(environment)" \
                        -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
                        -var="db_password=$(DB_PASSWORD)" \
                        -out=tfplan
                      terraform apply -auto-approve tfplan
                  displayName: 'Terraform Apply (Dev)'

                - download: current
                  artifact: 'app-artifact'

                - script: |
                    cd infra/ansible
                    pip3 install ansible --quiet
                    ansible-playbook deploy.yml
                  displayName: 'Ansible Deploy (Dev)'
                  env:
                    PROJECT_NAME: $(projectName)
                    ENVIRONMENT: $(environment)
                    BUILD_ARTIFACT_PATH: '$(Pipeline.Workspace)/app-artifact/$(projectName).zip'

  # ─── Stage 4: Deploy to Staging (Azure) ──────────────────────────────────────
  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: DeployDev
    condition: succeeded()
    variables:
      - name: environment
        value: 'staging'
    jobs:
      - deployment: DeployStaging
        environment: '$(projectName)-staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      export PATH="$HOME/bin:$PATH"
                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      if [ -n "$idToken" ]; then
                        export ARM_USE_OIDC=true
                        export ARM_OIDC_TOKEN="$idToken"
                      else
                        export ARM_CLIENT_SECRET="$servicePrincipalKey"
                      fi
                      cd infra/terraform
                      terraform init \
                        -backend-config="resource_group_name=tfstate-rg" \
                        -backend-config="storage_account_name=tfstate$(projectName)" \
                        -backend-config="container_name=tfstate" \
                        -backend-config="key=$(projectName).$(environment).tfstate"
                      terraform plan \
                        -var="environment=$(environment)" \
                        -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
                        -var="db_password=$(DB_PASSWORD)" \
                        -var="app_service_sku=S1" \
                        -out=tfplan
                      terraform apply -auto-approve tfplan
                  displayName: 'Terraform Apply (Staging)'

                - download: current
                  artifact: 'app-artifact'

                - script: |
                    cd infra/ansible
                    pip3 install ansible --quiet
                    ansible-playbook deploy.yml
                  displayName: 'Ansible Deploy (Staging)'
                  env:
                    PROJECT_NAME: $(projectName)
                    ENVIRONMENT: $(environment)
                    BUILD_ARTIFACT_PATH: '$(Pipeline.Workspace)/app-artifact/$(projectName).zip'

  # ─── Stage 5: DAST Scan (Azure) ──────────────────────────────────────────────
  - stage: DASTScanAzure
    displayName: 'DAST Scan (OWASP ZAP)'
    dependsOn: DeployStaging
    condition: succeeded()
    jobs:
      - job: ZapScan
        displayName: 'OWASP ZAP Baseline Scan'
        steps:
          - script: |
              docker run -t owasp/zap2docker-stable zap-baseline.py \
                -t https://$(projectName)-staging.azurewebsites.net || true
            displayName: 'Run OWASP ZAP on Staging'

  # ─── Stage 6: Deploy to Production (Azure) ───────────────────────────────────
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: DASTScanAzure
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    variables:
      - name: environment
        value: 'prod'
    jobs:
      - deployment: DeployProd
        environment: '$(projectName)-prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      export PATH="$HOME/bin:$PATH"
                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      if [ -n "$idToken" ]; then
                        export ARM_USE_OIDC=true
                        export ARM_OIDC_TOKEN="$idToken"
                      else
                        export ARM_CLIENT_SECRET="$servicePrincipalKey"
                      fi
                      cd infra/terraform
                      terraform init \
                        -backend-config="resource_group_name=tfstate-rg" \
                        -backend-config="storage_account_name=tfstate$(projectName)" \
                        -backend-config="container_name=tfstate" \
                        -backend-config="key=$(projectName).$(environment).tfstate"
                      terraform plan \
                        -var="environment=$(environment)" \
                        -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
                        -var="db_password=$(DB_PASSWORD)" \
                        -var="app_service_sku=P1v3" \
                        -out=tfplan
                      terraform apply -auto-approve tfplan
                  displayName: 'Terraform Apply (Prod)'

                - download: current
                  artifact: 'app-artifact'

                - script: |
                    cd infra/ansible
                    pip3 install ansible --quiet
                    ansible-playbook deploy.yml
                  displayName: 'Ansible Deploy (Prod)'
                  env:
                    PROJECT_NAME: $(projectName)
                    ENVIRONMENT: $(environment)
                    BUILD_ARTIFACT_PATH: '$(Pipeline.Workspace)/app-artifact/$(projectName).zip'
  {%- endif %}
