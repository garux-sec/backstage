# ใช้สำหรับ On-Premise VM deployment

services:
  app:
    image: ${{ values.dockerRegistry }}/${{ values.name }}:${IMAGE_TAG:-latest}
    container_name: ${{ values.name }}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    {%- if values.includeDatabase %}
    env_file:
      - .env.production
    depends_on:
      - postgres
    {%- endif %}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  {%- if values.includeDatabase %}
  postgres:
    image: postgres:16-alpine
    container_name: ${{ values.name }}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${{ values.name }}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
  {%- endif %}

  {%- if values.includeRedis %}
  redis:
    image: redis:7-alpine
    container_name: ${{ values.name }}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-network
  {%- endif %}

networks:
  app-network:
    driver: bridge

volumes:
  {%- if values.includeDatabase %}
  postgres-data:
  {%- endif %}
  {%- if values.includeRedis %}
  redis-data:
  {%- endif %}
