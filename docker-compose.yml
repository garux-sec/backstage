services:
  postgres:
    image: postgres:15
    container_name: mp-backstage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    ports:
      - "5432:5432"
    volumes:
      - mp_backstage_postgres:/var/lib/postgresql/data

volumes:
  mp_backstage_postgres:
